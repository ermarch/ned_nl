# ─────────────────────────────────────────────────────────────────────────────
# NED.nl Energy Dashboard — Lovelace YAML  (v1.0.4)
#
# HOW TO USE:
#   Settings → Dashboards → Add Dashboard → open it
#   → ⋮ → Edit → ⋮ → Raw configuration editor → paste this file.
#
# Required HACS frontend cards:
#   • custom:mini-graph-card   (HACS → Frontend → Mini Graph Card)
#   • custom:apexcharts-card   (HACS → Frontend → ApexCharts Card)
#     — only needed for the Forecast view future-curve graphs
#
# Units auto-scale: sensors store W/Wh, HA displays kW / MW / GW as appropriate.
# ─────────────────────────────────────────────────────────────────────────────

title: NED.nl Energy
views:

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 1 — Live Overview
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Live Overview
    path: overview
    icon: mdi:lightning-bolt-circle
    cards:

      - type: horizontal-stack
        cards:
          - type: stat
            entity: sensor.ned_nl_netherlands_solar_capacity
            name: Solar
            icon: mdi:solar-power
          - type: stat
            entity: sensor.ned_nl_netherlands_wind_capacity
            name: Wind
            icon: mdi:wind-turbine
          - type: stat
            entity: sensor.ned_nl_netherlands_electricity_load_consumption_capacity
            name: Electricity Load
            icon: mdi:home-lightning-bolt

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.ned_nl_netherlands_solar_percentage
            name: Solar
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
            needle: true
          - type: gauge
            entity: sensor.ned_nl_netherlands_wind_percentage
            name: Wind
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
            needle: true
          - type: gauge
            entity: sensor.ned_nl_netherlands_wind_offshore_percentage
            name: Wind Offshore
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
            needle: true

      - type: custom:mini-graph-card
        name: All Production Sources — 24h
        hours_to_show: 24
        group_by: hour
        aggregate_func: last
        show:
          legend: true
          labels: false
        entities:
          - entity: sensor.ned_nl_netherlands_solar_capacity
            name: Solar
            color: "#f9c74f"
          - entity: sensor.ned_nl_netherlands_wind_capacity
            name: Wind
            color: "#90be6d"
          - entity: sensor.ned_nl_netherlands_wind_offshore_capacity
            name: Wind Offshore
            color: "#43aa8b"
          - entity: sensor.ned_nl_netherlands_fossil_gas_capacity
            name: Gas
            color: "#f8961e"
          - entity: sensor.ned_nl_netherlands_hard_coal_capacity
            name: Coal
            color: "#6c757d"
          - entity: sensor.ned_nl_netherlands_nuclear_capacity
            name: Nuclear
            color: "#277da1"
          - entity: sensor.ned_nl_netherlands_biomass_power_capacity
            name: Biomass
            color: "#4d908e"
          - entity: sensor.ned_nl_netherlands_other_power_capacity
            name: Other
            color: "#adb5bd"

      - type: custom:mini-graph-card
        name: Renewables vs Load — 24h
        hours_to_show: 24
        group_by: hour
        aggregate_func: last
        show:
          legend: true
        entities:
          - entity: sensor.ned_nl_netherlands_solar_capacity
            name: Solar
            color: "#f9c74f"
          - entity: sensor.ned_nl_netherlands_wind_capacity
            name: Wind
            color: "#90be6d"
          - entity: sensor.ned_nl_netherlands_wind_offshore_capacity
            name: Wind Offshore
            color: "#43aa8b"
          - entity: sensor.ned_nl_netherlands_electricity_load_consumption_capacity
            name: Load
            color: "#e63946"

      - type: entities
        title: Current Values
        show_header_toggle: false
        entities:
          - entity: sensor.ned_nl_netherlands_solar_capacity
            name: ☀️ Solar
          - entity: sensor.ned_nl_netherlands_wind_capacity
            name: 💨 Wind
          - entity: sensor.ned_nl_netherlands_wind_offshore_capacity
            name: 🌊 Wind Offshore
          - entity: sensor.ned_nl_netherlands_fossil_gas_capacity
            name: 🔥 Fossil Gas
          - entity: sensor.ned_nl_netherlands_hard_coal_capacity
            name: ⚫ Hard Coal
          - entity: sensor.ned_nl_netherlands_nuclear_capacity
            name: ⚛️ Nuclear
          - entity: sensor.ned_nl_netherlands_biomass_power_capacity
            name: 🌿 Biomass
          - entity: sensor.ned_nl_netherlands_other_power_capacity
            name: ➕ Other
          - type: divider
          - entity: sensor.ned_nl_netherlands_electricity_load_consumption_capacity
            name: ⚡ Electricity Load
          - entity: sensor.ned_nl_netherlands_all_consuming_gas_consumption_capacity
            name: 🏭 Gas Consumption

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 2 — Production
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Production
    path: production
    icon: mdi:solar-power-variant
    cards:

      - type: custom:mini-graph-card
        name: Solar — 24h
        hours_to_show: 24
        group_by: 10min
        aggregate_func: last
        color: "#f9c74f"
        entities:
          - entity: sensor.ned_nl_netherlands_solar_capacity
            name: Solar

      - type: horizontal-stack
        cards:
          - type: stat
            entity: sensor.ned_nl_netherlands_solar_capacity
            name: Solar Now
          - type: stat
            entity: sensor.ned_nl_netherlands_solar_volume
            name: Solar Volume
          - type: stat
            entity: sensor.ned_nl_netherlands_solar_percentage
            name: Solar %

      - type: custom:mini-graph-card
        name: Wind — 24h
        hours_to_show: 24
        group_by: 10min
        aggregate_func: last
        show:
          legend: true
        entities:
          - entity: sensor.ned_nl_netherlands_wind_capacity
            name: Onshore
            color: "#90be6d"
          - entity: sensor.ned_nl_netherlands_wind_offshore_capacity
            name: Offshore
            color: "#43aa8b"

      - type: custom:mini-graph-card
        name: Thermal & Nuclear — 24h
        hours_to_show: 24
        group_by: hour
        aggregate_func: last
        show:
          legend: true
        entities:
          - entity: sensor.ned_nl_netherlands_fossil_gas_capacity
            name: Gas
            color: "#f8961e"
          - entity: sensor.ned_nl_netherlands_hard_coal_capacity
            name: Coal
            color: "#6c757d"
          - entity: sensor.ned_nl_netherlands_nuclear_capacity
            name: Nuclear
            color: "#277da1"
          - entity: sensor.ned_nl_netherlands_biomass_power_capacity
            name: Biomass
            color: "#4d908e"
          - entity: sensor.ned_nl_netherlands_other_power_capacity
            name: Other
            color: "#adb5bd"

      - type: history-graph
        title: Production History — 48h
        hours_to_show: 48
        entities:
          - entity: sensor.ned_nl_netherlands_solar_capacity
            name: Solar
          - entity: sensor.ned_nl_netherlands_wind_capacity
            name: Wind
          - entity: sensor.ned_nl_netherlands_wind_offshore_capacity
            name: Wind Offshore
          - entity: sensor.ned_nl_netherlands_fossil_gas_capacity
            name: Gas
          - entity: sensor.ned_nl_netherlands_nuclear_capacity
            name: Nuclear

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 3 — Consumption
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Consumption
    path: consumption
    icon: mdi:home-lightning-bolt
    cards:

      - type: horizontal-stack
        cards:
          - type: stat
            entity: sensor.ned_nl_netherlands_electricity_load_consumption_capacity
            name: Electricity Load
            icon: mdi:lightning-bolt
          - type: stat
            entity: sensor.ned_nl_netherlands_electricity_load_consumption_volume
            name: Electricity Volume
            icon: mdi:counter
          - type: stat
            entity: sensor.ned_nl_netherlands_all_consuming_gas_consumption_capacity
            name: Gas Load
            icon: mdi:gas-burner

      - type: custom:mini-graph-card
        name: Electricity Load — 24h
        hours_to_show: 24
        group_by: hour
        aggregate_func: last
        color: "#e63946"
        entities:
          - entity: sensor.ned_nl_netherlands_electricity_load_consumption_capacity
            name: Electricity Load

      - type: custom:mini-graph-card
        name: Gas Consumption — 24h
        hours_to_show: 24
        group_by: hour
        aggregate_func: last
        color: "#f8961e"
        entities:
          - entity: sensor.ned_nl_netherlands_all_consuming_gas_consumption_capacity
            name: Gas Load

      - type: custom:mini-graph-card
        name: Renewables vs Load — 48h
        hours_to_show: 48
        group_by: hour
        aggregate_func: last
        show:
          legend: true
        entities:
          - entity: sensor.ned_nl_netherlands_solar_capacity
            name: Solar
            color: "#f9c74f"
          - entity: sensor.ned_nl_netherlands_wind_capacity
            name: Wind
            color: "#90be6d"
          - entity: sensor.ned_nl_netherlands_wind_offshore_capacity
            name: Wind Offshore
            color: "#43aa8b"
          - entity: sensor.ned_nl_netherlands_electricity_load_consumption_capacity
            name: Load
            color: "#e63946"

      - type: history-graph
        title: Consumption History — 48h
        hours_to_show: 48
        entities:
          - entity: sensor.ned_nl_netherlands_electricity_load_consumption_capacity
            name: Electricity
          - entity: sensor.ned_nl_netherlands_all_consuming_gas_consumption_capacity
            name: Gas

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 4 — Forecast
  #
  # Uses custom:apexcharts-card with data_generator to plot the future curve
  # from the forecast_series attribute on each forecast_capacity sensor.
  # Each entry has: { ts: <unix ms>, capacity: <W>, validfrom: <ISO string> }
  # item.ts is used directly (no JS date parsing needed).
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Forecast
    path: forecast
    icon: mdi:chart-line
    cards:

      # ── At-a-glance: next non-zero upcoming slot ──────────────────────────
      - type: entities
        title: Next forecast slot
        show_header_toggle: false
        entities:
          - entity: sensor.ned_nl_netherlands_solar_forecast_capacity
            name: ☀️ Solar
          - entity: sensor.ned_nl_netherlands_wind_forecast_capacity
            name: 💨 Wind
          - entity: sensor.ned_nl_netherlands_wind_offshore_forecast_capacity
            name: 🌊 Wind Offshore
          - entity: sensor.ned_nl_netherlands_electricity_mix_forecast_capacity
            name: ⚡ Total Grid Mix

      # ── Solar forecast — future curve ─────────────────────────────────────
      # data_generator reads forecast_series[].ts (unix ms) and .capacity (W).
      # HA will display the y-axis in kW/MW/GW to match the sensor unit.
      - type: custom:apexcharts-card
        header:
          show: true
          title: Solar Forecast — next 48h
        chart_type: line
        apex_config:
          xaxis:
            type: datetime
          yaxis:
            labels:
              formatter: |
                EVAL:function(val) {
                  if (val >= 1e9) return (val/1e9).toFixed(2) + ' GW';
                  if (val >= 1e6) return (val/1e6).toFixed(2) + ' MW';
                  if (val >= 1e3) return (val/1e3).toFixed(1) + ' kW';
                  return val + ' W';
                }
        series:
          - entity: sensor.ned_nl_netherlands_solar_forecast_capacity
            name: Solar
            color: "#f9c74f"
            data_generator: |
              return entity.attributes.forecast_series
                ? entity.attributes.forecast_series
                : [];

      # ── Wind forecast — future curve ──────────────────────────────────────
      - type: custom:apexcharts-card
        header:
          show: true
          title: Wind Forecast — next 48h
        chart_type: line
        apex_config:
          xaxis:
            type: datetime
          yaxis:
            labels:
              formatter: |
                EVAL:function(val) {
                  if (val >= 1e9) return (val/1e9).toFixed(2) + ' GW';
                  if (val >= 1e6) return (val/1e6).toFixed(2) + ' MW';
                  if (val >= 1e3) return (val/1e3).toFixed(1) + ' kW';
                  return val + ' W';
                }
        series:
          - entity: sensor.ned_nl_netherlands_wind_forecast_capacity
            name: Wind
            color: "#90be6d"
            data_generator: |
              return entity.attributes.forecast_series
                ? entity.attributes.forecast_series
                : [];
          - entity: sensor.ned_nl_netherlands_wind_offshore_forecast_capacity
            name: Wind Offshore
            color: "#43aa8b"
            data_generator: |
              return entity.attributes.forecast_series
                ? entity.attributes.forecast_series
                : [];

      # ── Total grid mix forecast (ElectricityMix type 27) ──────────────────
      - type: custom:apexcharts-card
        header:
          show: true
          title: Total Grid Mix Forecast — next 48h
        chart_type: line
        apex_config:
          xaxis:
            type: datetime
          yaxis:
            labels:
              formatter: |
                EVAL:function(val) {
                  if (val >= 1e9) return (val/1e9).toFixed(2) + ' GW';
                  if (val >= 1e6) return (val/1e6).toFixed(2) + ' MW';
                  if (val >= 1e3) return (val/1e3).toFixed(1) + ' kW';
                  return val + ' W';
                }
        series:
          - entity: sensor.ned_nl_netherlands_electricity_mix_forecast_capacity
            name: Grid Mix
            color: "#277da1"
            data_generator: |
              return entity.attributes.forecast_series
                ? entity.attributes.forecast_series
                : [];

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 5 — CO₂
  # ═══════════════════════════════════════════════════════════════════════════
  - title: CO₂
    path: co2
    icon: mdi:molecule-co2
    cards:

      - type: horizontal-stack
        cards:
          - type: stat
            entity: sensor.ned_nl_netherlands_fossil_gas_capacity
            name: Gas
            icon: mdi:fire
          - type: stat
            entity: sensor.ned_nl_netherlands_hard_coal_capacity
            name: Coal
            icon: mdi:coal
          - type: stat
            entity: sensor.ned_nl_netherlands_nuclear_capacity
            name: Nuclear
            icon: mdi:atom

      - type: custom:mini-graph-card
        name: Fossil Sources — 48h
        hours_to_show: 48
        group_by: hour
        aggregate_func: last
        show:
          legend: true
        entities:
          - entity: sensor.ned_nl_netherlands_fossil_gas_capacity
            name: Gas
            color: "#f8961e"
          - entity: sensor.ned_nl_netherlands_hard_coal_capacity
            name: Coal
            color: "#6c757d"

      - type: entities
        title: Low-carbon Sources
        show_header_toggle: false
        entities:
          - entity: sensor.ned_nl_netherlands_nuclear_capacity
            name: ⚛️ Nuclear
          - entity: sensor.ned_nl_netherlands_biomass_power_capacity
            name: 🌿 Biomass
          - entity: sensor.ned_nl_netherlands_solar_capacity
            name: ☀️ Solar
          - entity: sensor.ned_nl_netherlands_wind_capacity
            name: 💨 Wind
          - entity: sensor.ned_nl_netherlands_wind_offshore_capacity
            name: 🌊 Wind Offshore
