# ─────────────────────────────────────────────────────────────────────────────
# NED.nl Energy Dashboard — Lovelace YAML
# Entity IDs matched to actual HA registry (verified 2026-03-04)
# Requires: custom:mini-graph-card, custom:apexcharts-card (HACS → Frontend)
# ─────────────────────────────────────────────────────────────────────────────
title: NED.nl Energy
views:

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 1 — Overview
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:lightning-bolt-circle
    cards:

      - type: entities
        title: Current Production
        show_header_toggle: false
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_solar_volume_2
            name: ☀️ Solar
          - entity: sensor.ned_nl_netherlands_netherlands_wind_volume_2
            name: 💨 Wind
          - entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_volume_2
            name: 🌊 Wind Offshore
          - entity: sensor.ned_nl_netherlands_netherlands_fossil_gas_volume_2
            name: 🔥 Fossil Gas
          - entity: sensor.ned_nl_netherlands_netherlands_hard_coal_volume_2
            name: ⚫ Hard Coal
          - entity: sensor.ned_nl_netherlands_netherlands_nuclear_volume_2
            name: ⚛️ Nuclear
          - entity: sensor.ned_nl_netherlands_netherlands_biomass_power_volume_2
            name: 🌿 Biomass
          - entity: sensor.ned_nl_netherlands_netherlands_other_power_volume_2
            name: ➕ Other
          - type: divider
          - entity: sensor.ned_nl_netherlands_netherlands_electricity_load_consumption_volume
            name: ⚡ Electricity Load
          - entity: sensor.ned_nl_netherlands_netherlands_all_consuming_gas_consumption_volume
            name: 🏭 Gas Consumption

      - type: custom:mini-graph-card
        name: Renewables — 24h
        hours_to_show: 24
        group_by: hour
        aggregate_func: last
        show:
          legend: true
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_solar_volume_2
            name: Solar
            color: "#f9c74f"
          - entity: sensor.ned_nl_netherlands_netherlands_wind_volume_2
            name: Wind
            color: "#90be6d"
          - entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_volume_2
            name: Wind Offshore
            color: "#43aa8b"

      - type: custom:mini-graph-card
        name: All Sources — 24h
        hours_to_show: 24
        group_by: hour
        aggregate_func: last
        show:
          legend: true
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_solar_volume_2
            name: Solar
            color: "#f9c74f"
          - entity: sensor.ned_nl_netherlands_netherlands_wind_volume_2
            name: Wind
            color: "#90be6d"
          - entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_volume_2
            name: Wind Offshore
            color: "#43aa8b"
          - entity: sensor.ned_nl_netherlands_netherlands_fossil_gas_volume_2
            name: Gas
            color: "#f8961e"
          - entity: sensor.ned_nl_netherlands_netherlands_hard_coal_volume_2
            name: Coal
            color: "#6c757d"
          - entity: sensor.ned_nl_netherlands_netherlands_nuclear_volume_2
            name: Nuclear
            color: "#277da1"
          - entity: sensor.ned_nl_netherlands_netherlands_biomass_power_volume_2
            name: Biomass
            color: "#4d908e"

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 2 — Percentages
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Percentages
    path: percentages
    icon: mdi:percent
    cards:

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.ned_nl_netherlands_netherlands_solar_percentage_2
            name: Solar
            min: 0
            max: 100
            severity:
              green: 40
              yellow: 15
              red: 0
            needle: true
          - type: gauge
            entity: sensor.ned_nl_netherlands_netherlands_wind_percentage_2
            name: Wind
            min: 0
            max: 100
            severity:
              green: 40
              yellow: 15
              red: 0
            needle: true
          - type: gauge
            entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_percentage_2
            name: Offshore
            min: 0
            max: 100
            severity:
              green: 40
              yellow: 15
              red: 0
            needle: true

      - type: entities
        title: Utilisation %
        show_header_toggle: false
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_solar_percentage_2
            name: ☀️ Solar
          - entity: sensor.ned_nl_netherlands_netherlands_wind_percentage_2
            name: 💨 Wind
          - entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_percentage_2
            name: 🌊 Wind Offshore
          - entity: sensor.ned_nl_netherlands_netherlands_fossil_gas_percentage_2
            name: 🔥 Fossil Gas
          - entity: sensor.ned_nl_netherlands_netherlands_hard_coal_percentage_2
            name: ⚫ Hard Coal
          - entity: sensor.ned_nl_netherlands_netherlands_nuclear_percentage_2
            name: ⚛️ Nuclear
          - entity: sensor.ned_nl_netherlands_netherlands_biomass_power_percentage_2
            name: 🌿 Biomass
          - entity: sensor.ned_nl_netherlands_netherlands_other_power_percentage_2
            name: ➕ Other
          - type: divider
          - entity: sensor.ned_nl_netherlands_netherlands_electricity_load_consumption_percentage
            name: ⚡ Electricity Load
          - entity: sensor.ned_nl_netherlands_netherlands_all_consuming_gas_consumption_percentage
            name: 🏭 Gas Consumption

      - type: custom:mini-graph-card
        name: Renewable % — 24h
        hours_to_show: 24
        group_by: hour
        aggregate_func: last
        show:
          legend: true
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_solar_percentage_2
            name: Solar
            color: "#f9c74f"
          - entity: sensor.ned_nl_netherlands_netherlands_wind_percentage_2
            name: Wind
            color: "#90be6d"
          - entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_percentage_2
            name: Wind Offshore
            color: "#43aa8b"

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 3 — Consumption
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Consumption
    path: consumption
    icon: mdi:home-lightning-bolt
    cards:

      - type: entities
        title: Consumption
        show_header_toggle: false
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_electricity_load_consumption_volume
            name: ⚡ Electricity Load
          - entity: sensor.ned_nl_netherlands_netherlands_electricity_load_consumption_percentage
            name: ⚡ Electricity Load %
          - entity: sensor.ned_nl_netherlands_netherlands_all_consuming_gas_consumption_volume
            name: 🏭 Gas Consumption
          - entity: sensor.ned_nl_netherlands_netherlands_all_consuming_gas_consumption_percentage
            name: 🏭 Gas Consumption %

      - type: custom:mini-graph-card
        name: Electricity Load — 24h
        hours_to_show: 24
        group_by: hour
        aggregate_func: last
        color: "#e63946"
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_electricity_load_consumption_volume
            name: Electricity Load

      - type: custom:mini-graph-card
        name: Gas Consumption — 24h
        hours_to_show: 24
        group_by: hour
        aggregate_func: last
        color: "#f8961e"
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_all_consuming_gas_consumption_volume
            name: Gas

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 4 — Forecast
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Forecast
    path: forecast
    icon: mdi:chart-line
    cards:

      - type: entities
        title: Next forecast slot
        show_header_toggle: false
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_solar_forecast_volume
            name: ☀️ Solar
          - entity: sensor.ned_nl_netherlands_netherlands_solar_forecast_percentage
            name: ☀️ Solar %
          - entity: sensor.ned_nl_netherlands_netherlands_wind_forecast_volume
            name: 💨 Wind
          - entity: sensor.ned_nl_netherlands_netherlands_wind_forecast_percentage
            name: 💨 Wind %
          - entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_forecast_volume
            name: 🌊 Wind Offshore
          - entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_forecast_percentage
            name: 🌊 Wind Offshore %
          - entity: sensor.ned_nl_netherlands_netherlands_electricity_mix_forecast_volume
            name: ⚡ Grid Mix
          - entity: sensor.ned_nl_netherlands_netherlands_electricity_mix_forecast_percentage
            name: ⚡ Grid Mix %

      - type: custom:apexcharts-card
        header:
          show: true
          title: Solar Forecast — next 48h
        chart_type: line
        graph_span: 48h
        span:
          start: now
        apex_config:
          xaxis:
            type: datetime
        series:
          - entity: sensor.ned_nl_netherlands_netherlands_solar_forecast_volume
            name: Solar
            color: "#f9c74f"
            data_generator: |
              return entity.attributes.forecast_series
                ? entity.attributes.forecast_series
                : [];

      - type: custom:apexcharts-card
        header:
          show: true
          title: Wind Forecast — next 48h
        chart_type: line
        graph_span: 48h
        span:
          start: now
        apex_config:
          xaxis:
            type: datetime
        series:
          - entity: sensor.ned_nl_netherlands_netherlands_wind_forecast_volume
            name: Wind
            color: "#90be6d"
            data_generator: |
              return entity.attributes.forecast_series
                ? entity.attributes.forecast_series
                : [];
          - entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_forecast_volume
            name: Wind Offshore
            color: "#43aa8b"
            data_generator: |
              return entity.attributes.forecast_series
                ? entity.attributes.forecast_series
                : [];

      - type: custom:apexcharts-card
        header:
          show: true
          title: Total Grid Mix Forecast — next 48h
        chart_type: line
        graph_span: 48h
        span:
          start: now
        apex_config:
          xaxis:
            type: datetime
        series:
          - entity: sensor.ned_nl_netherlands_netherlands_electricity_mix_forecast_volume
            name: Grid Mix
            color: "#a78bfa"
            data_generator: |
              return entity.attributes.forecast_series
                ? entity.attributes.forecast_series
                : [];

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 5 — CO₂
  # ═══════════════════════════════════════════════════════════════════════════
  - title: CO₂
    path: co2
    icon: mdi:molecule-co2
    cards:

      - type: entities
        title: Fossil & Low-carbon Sources
        show_header_toggle: false
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_fossil_gas_volume_2
            name: 🔥 Fossil Gas
          - entity: sensor.ned_nl_netherlands_netherlands_fossil_gas_percentage_2
            name: 🔥 Fossil Gas %
          - entity: sensor.ned_nl_netherlands_netherlands_hard_coal_volume_2
            name: ⚫ Hard Coal
          - entity: sensor.ned_nl_netherlands_netherlands_hard_coal_percentage_2
            name: ⚫ Hard Coal %
          - entity: sensor.ned_nl_netherlands_netherlands_nuclear_volume_2
            name: ⚛️ Nuclear
          - entity: sensor.ned_nl_netherlands_netherlands_biomass_power_volume_2
            name: 🌿 Biomass
          - entity: sensor.ned_nl_netherlands_netherlands_solar_volume_2
            name: ☀️ Solar
          - entity: sensor.ned_nl_netherlands_netherlands_wind_volume_2
            name: 💨 Wind
          - entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_volume_2
            name: 🌊 Wind Offshore

      - type: custom:mini-graph-card
        name: Fossil Sources — 48h
        hours_to_show: 48
        group_by: hour
        aggregate_func: last
        show:
          legend: true
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_fossil_gas_volume_2
            name: Gas
            color: "#f8961e"
          - entity: sensor.ned_nl_netherlands_netherlands_hard_coal_volume_2
            name: Coal
            color: "#6c757d"

      - type: custom:mini-graph-card
        name: Low-carbon Sources — 48h
        hours_to_show: 48
        group_by: hour
        aggregate_func: last
        show:
          legend: true
        entities:
          - entity: sensor.ned_nl_netherlands_netherlands_nuclear_volume_2
            name: Nuclear
            color: "#277da1"
          - entity: sensor.ned_nl_netherlands_netherlands_biomass_power_volume_2
            name: Biomass
            color: "#4d908e"
          - entity: sensor.ned_nl_netherlands_netherlands_solar_volume_2
            name: Solar
            color: "#f9c74f"
          - entity: sensor.ned_nl_netherlands_netherlands_wind_volume_2
            name: Wind
            color: "#90be6d"
          - entity: sensor.ned_nl_netherlands_netherlands_wind_offshore_volume_2
            name: Wind Offshore
            color: "#43aa8b"
